name: Build Pharma Core
on:
  push: { branches: [ main ] }
  pull_request: { branches: [ main ] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable', cache: true }
      # repo ships lib/ + pubspec only → generate native folders
      - run: flutter create --platforms=android,ios .
      - name: Add Android permissions (camera + internet)   # for the scanner
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <application|' "$MANIFEST"
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings || true
      - run: flutter build apk --debug
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4    # debug APK
        with: { name: pharma-core-debug-apk, path: build/app/outputs/flutter-apk/app-debug.apk }
      - uses: actions/upload-artifact@v4    # release APK
        with: { name: pharma-core-release-apk, path: build/app/outputs/flutter-apk/app-release.apk }
